## DBC no R

.blockgreen[  ## Suplemento alimentar para vacas em lactação

- Um produtor de leite está interessado em saber se a suplementação alimentar de vacas em lactação pode aumentar a produção de leite.

- Comparar a produção de leite das vacas com suplemento e sem suplemento.
		
- **Tratamentos:** mandioca, araruta, batata doce e sem suplemento.
		
- **Blocos:** raças disponíveis (Gir, Holandesa, Jersey, Nelore e Guzerá).

&lt;br&gt;

- 4 tratamentos e 5 blocos
		
		
]

## DQL no R

.blockgreen[  ## Formulações de propulsores (Ex. 4.3, Montgomery, 2012)

- Um engenheiro aeroespacial está estudando os efeitos de cinco formulações diferentes de um propulsor de foguete usado em sistemas de evacuação da tripulação.

- Variável a ser observada: velocidade de queima das formulações.

- Cada formulação é misturada a partir de um lote de matéria-prima que é suficientemente para cinco formulações.

- As formulações são preparadas por diversos operadores.

- Duas fontes de perturbação: lotes e operadores.

- Delineamento apropriado: testar cada formulação apenas uma vez em cada lote de matéria-prima e cada operador preparar uma vez cada formulação.

]


---

.scroll-box-20[


```r
