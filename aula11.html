## Experimentos fatoriais em parcelas subdivididas

 - Nos experimentos (fatoriais) em parcelas subdivididas (ou *split-plot*), as parcelas são divididas em partes menores e iguais, denominadas **sub parcelas**. (que serão as unidades básicas experimentais)
 
 - As parcelas podem ser distribuídas de modo inteiramente casualizado, em blocos
casualizados, ou em linhas e colunas (DQL).

- A principal característica dos experimentos em parcelas subdivididas é a casualização dos níveis dos fatores em dois (ou mais) estágios.

---

**Casualização:**

-  No primeiro estágio são casualizados os níveis do primeiro fator (fator primário ou fator principal), nas parcelas (em DIC, DBC ou DQL).

- No segundo estágio são **casualizados os níveis do outro fator** (fator secundário) **nas subparcelas de cada parcela**.

- **Atenção:** cada parcela é constituída por subparcelas!

-  Os níveis do fator casualizado nas parcelas são denominados **Tratamentos Primários** ou  **Tratamentos Principais**.

-  Os níveis do fator casualizado nas subparcelas são denominados **Tratamentos Secundários** ou **Subtratamentos**.

---


- Nos experimentos (fatoriais) em parcelas subdivididas há dois resíduos:

  - **Resíduo a:** base de comparação dos Tratamentos Principais, Blocos, Linhas e Colunas (se houver).
  
  - **Resíduo b:** base de comparação dos Tratamentos Secundários e da Interação Tratamentos Principais `\(\times\)` Tratamentos Secundários.

---

**Exemplo**


- Exemplificando a distribuição dos níveis dos fatores...

- Em um experimento em parcelas subdivididas, com os fatores:

- **Fator principal**: Adubações ( `\(A_0\)` e `\(A_1\)` )

- **Fator secundário**: Variedades ( `\(V_1\)`, `\(V_2\)` e `\(V_3\)` )

- e em  cinco blocos casualizados.


**Aleatorização**:

1. Cada bloco deve ser dividido em duas parcelas, nas quais serão distribuídas ao acaso as duas Adubações.

2. Cada parcela deve ser dividida em três subparcelas, e as três Variedades serão sorteadas nas três subparcelas de cada parcela.

**Atenção**:  Se o experimento fosse instalado como fatorial, deveria ser feito um sorteio único dos seis tratamentos (combinações das duas Adubações com as três Variedades) nas seis parcelas de cada bloco.

- No experimento fatorial, todos os fatores são testados com um resíduo único, com 20 graus de liberdade.

- No experimento em parcelas subdivididas, Adubações é testado com um resíduo com apenas 4 graus de liberdade e  Variedades e a Interação Adubações `\(\times\)` Variedades são testados com um resíduo com 16 graus de liberdade.

- Sempre que possível, é preferível utilizar o fatorial em vez de parcelas subdivididas.

**Exemplo 2 no R**

**Caso 2: interação significativa:**


- Um experimento avaliou o peso do pulmão (g) de ratos em duas dietas de vitamina A (moderada e suficiente) e em 5 períodos após o início da dieta.

- 60 ratos Lister Hooded foram distribuídas em 12 gaiolas (5 ratos em cada gaiola).

- Cada gaiola foi aleatorizada a uma das dietas, totalizando 6 gaiolas por dieta.

- Em cada um dos tempos 10, 15, 20, 25 e 30, um animal por gaiola era sacrificado e o peso do pulmão era mensurado. 

- Nesse experimento as gaiolas (dietas de vitamina A) são as parcelas e os animais (tempo) são as subparcelas.

- O experimento foi realizado em DIC.


- Arquivo com os dados: [dados_peso_pulmao_ratos_subdivididas_dic.xlsx](docs_aula11/dados_peso_pulmao_ratos_subdivididas_dic.xlsx)

**Exemplo 3 no R (Exemplo 11.2, Sampaio; 2015)**

**Caso 2: interação significativa:**

- Avaliar a motilidade observada no sêmen em função de 3 diluentes (A, B e C) e 3 tempos de conservação (8, 24 e 36h) a `\(5^\circ C\)`.

- Cinco jumentos (blocos) foram utilizados.

- Para cada jumento, o primeiro ejaculado foi dividido em três alíquotas, diluídas cada uma em um dos diluentes e este volume novamente dividido em outras três alíquotas, uma para cada tempo de conservação.


**bloco:** animal

**parcela:** diluente

**subparcela:** tempo de conservação


- Arquivo com os dados: [dados_motilidade_semen_subdivididas_dbc.xlsx](docs_aula11/dados_motilidade_semen_subdivididas_dbc.xlsx)

## Experimentos fatoriais em parcelas subdivididas no tempo

**ou medidas repetidas**

- Medidas tomadas em uma seqüência de tempos, **em uma mesma unidade experimental**.

-  Os experimentos com medidas repetidas no tempo envolvem, geralmente, 2 fatores: tratamentos e tempos.

- O objetivo principal desse tipo de experimento é examinar e comparar as tendências dos tratamentos ao longo do tempo. *Isto pode envolver comparações entre tratamentos dentro de cada tempo, ou comparações de tempos dentro de cada tratamento.*


---


**Exemplo 4 no R**

**Caso 2: interação significativa:**


- Em um experimento com suínos foram comparadas quatro rações ( `\(A\)`, `\(B\)`, `\(C\)`, `\(D\)` ) e o ganho de peso dos animais ao longo do tempo, com mensurações em 30 e 60 dias após o início da dieta.

- Delineamento em blocos casualizados para controlar o peso inicial dos animais.

- A parcela constituiu-se de um animal e a subparcela são os tempos de mensurações do peso (no mesmo animal).




**bloco:** animal

**parcela:** ração

**subparcela:** tempos (mensuração de pesos)


- Arquivo com os dados: [dados_pesos_suinos_subdivididas_dbc.xlsx](docs_aula11/dados_pesos_suinos_subdivididas_dbc.xlsx)
