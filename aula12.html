## Correlação e regressão linear <i class="fas  fa-chart-line fa-pull-right "></i>


**Objetivos:**

- Verificar se há relação linear entre duas variáveis numéricas ( `\(X\)` e `\(Y\)` ) e o grau dessa relação.


- Determinar uma função que relaciona as variáveis.


- A partir de valores de uma variável `\(X\)`, é possível predizer os valores de `\(Y\)`.

## Correlação linear: coeficiente de Pearson <i class="fas  fa-chart-line fa-pull-right "></i>

- Sejam `\((X_1, Y_1), (X_2, Y_2), \cdots, (X_n, Y_n)\)` uma amostra aleatória de `\(n\)` pares independentes de variáveis aleatórias normais, de coeficiente de correlação `\(\rho\)` (letra grega *rho*), um estimador de `\(\rho\)`, é o coeficiente de correlação de Pearson, calculado por:

`\begin{align*}
r = \frac{\sum_{i = 1}^n (X_i - \bar{X}) (Y_i - \bar{Y}) }{\sqrt{ \sum_{i = 1}^n (X_i - \bar{X})
^2  \sum_{i = 1}^n (Y_i - \bar{Y})^2   }   } = \frac{S_{XY}}{\sqrt{S_{XX}S_{YY}}}
\end{align*}`


**Obs:**

- `\(r \in \left[ -1, 1 \right]\)`

- O coeficiente de correlação independe das unidades de medida de `\(X\)` e `\(Y\)`.

- `\(r\)` não tem unidade de medida.


---
## Correlação linear: coeficiente de Pearson <i class="fas  fa-chart-line fa-pull-right "></i>


**Teste de hipóteses**


- Hipóteses

$$
H_0: \rho = 0 \quad versus \quad H_1: \rho \ne 0
$$
- Estatística de teste

$$
T_c = r \sqrt{\frac{n - 2}{1 - r^2}  }
$$

- Decisão: Rejeita-se `\(H_0\)`, ao nível de significância `\(\alpha\)`, se `\(|T_c| &gt; t_{(\alpha/2, n - 2)}\)`, sendo `\(t_{(\alpha/2, n - 2)}\)` o quantil superior `\(\alpha/2\)` da distribuição `\(T\)` com `\(n -2\)` graus de liberdade, e

`\begin{align*}
r = \frac{\sum_{i = 1}^n (X_i - \bar{X}) (Y_i - \bar{Y}) }{\sqrt{ \sum_{i = 1}^n (X_i - \bar{X})^2  \sum_{i = 1}^n (Y_i - \bar{Y})^2   }   } \quad \quad ou \quad \quad r = \frac{S_{XY}}{\sqrt{S_{XX}S_{YY}}}.
\end{align*}`


---
## Correlação linear: coeficiente de Pearson <i class="fas  fa-chart-line fa-pull-right "></i>


**Intervalo de confiança `\(IC_{100(1 - \alpha)\%}(\rho)\)`**

**Calcular os seguintes passos:**

1. `\(\bar{X}\)`, `\(\bar{Y}\)`, `\(S_{XY} = \sum_{i = 1}^n (X_i - \bar{X}) (Y_i - \bar{Y})\)`, `\(S_{XX} = \sum_{i = 1}^n (X_i - \bar{X})^2\)`, `\(S_{YY} = \sum_{i = 1}^n (Y_i - \bar{Y})^2\)` e `\(r = S_{XY}/\sqrt{S_{XX}S_{YY}}\)`

2. `\(z = 0,5 \log \left( \frac{1 + r}{1 - r} \right)\)`

3. `\(z_1 = z - z_{\alpha/2}/\sqrt{n -3} \quad \quad e \quad \quad z_2 = z + z_{\alpha/2}/\sqrt{n -3}\)`

4. `\(r_1 = \frac{e^{2z_1} - 1}{e^{2z_1} + 1} \quad \quad e \quad \quad r_2 = \frac{e^{2z_2} - 1}{e^{2z_2} + 1}\)`

5. `\(IC_{100(1 - \alpha)\%}(\rho):\left(r_1, r_2\right)\)`

## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>


**Modelos Empíricos**

-  Muitos problemas em diversas áreas do conhecimento envolvem explorar as relações entre duas ou mais variáveis.

  -  *a pressão de um gás em um recipiente está relacionada com a temperatura*
  
  -  *a velocidade da água em um canal aberto está relacionada com a largura do canal*

  -  *o deslocamento de uma partícula em certo tempo está relacionado com sua velocidade.*

-  No último exemplo, se `\(d_0\)` for o deslocamento da partícula a partir da origem no tempo `\(t = 0\)` e `\(v\)` for a velocidade, então o deslocamento no tempo `\(t\)` é `\(dt = d_0 + vt\)`.
-  Esse é um exemplo de uma relação linear determinística, porque (sem considerar os erros de medida) o modelo prevê perfeitamente o deslocamento.

---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Modelos Empíricos**

-  Entretanto, existem muitas situações em que a relação entre variáveis não é determinística.

  -  *o consumo de energia elétrica ( `\(y\)` ) de uma casa está relacionado com o tamanho da casa ( `\(x\)`, em `\(m^2\)` ).*

  -  *o consumo de combustível ( `\(y\)` ) de um automóvel está relacionado com o peso ( `\(x\)` ) do veículo.*

-  Em ambos os exemplos, o valor da resposta de interesse `\(y\)` (consumo de energia, consumo de combustível) não pode ser previsto perfeitamente a partir do conhecimento do `\(x\)` correspondente.

-  É possível, para diferentes automóveis, haver consumos diferentes de combustível, mesmo que eles tenham o mesmo peso, e é possível que diferentes casas usem diferentes quantidades de eletricidade, mesmo se elas têm o mesmo tamanho.


---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Modelos Empíricos**

A coleção de ferramentas estatísticas que são usadas para modelar e explorar relações entre variáveis que estão relacionadas de maneira **não determinística** é chamada de **análise de regressão**.

.blockgreen[ ## Exemplo (Pureza de Oxigênio)

-  Enquanto a média de `\(Y\)`, `\(E(Y|x)\)`, é uma função linear de `\(x\)`, o valor real observado, `\(y\)`, não cai exatamente na linha reta.
-  A maneira apropriada de generalizar isso para um modelo linear probabilístico é considerar que, para um valor fixo de `\(x\)`, o valor real de `\(Y\)` seja determinado pela função do valor médio (o modelo linear) mais um termo de erro aleatório,
$$
  Y = \beta_0 + \beta_1 x + \epsilon,
  $$
sendo `\(\epsilon\)` o termo de erro aleatório que, em geral, será considerado normal de média `\(\mu = 0\)` e variância `\(\sigma^2\)`, ou seja, `\(N(0,\sigma^2)\)`.

-  Chamaremos esse modelo de **modelo de regressão linear simples**, porque ele tem apenas uma variável independente ou regressora ( `\(x\)` ).

]

## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

-  No modelo
$$
  Y = \beta_0 + \beta_1 x + \epsilon
  $$

-  O coeficiente angular, `\(\beta_1\)`, pode ser interpretado como a mudança na média de `\(Y\)` para uma mudança unitária em `\(x\)`.

$$
  E(Y| x + 1) = \beta_0 + \beta_1 (x + 1) = \beta_0 + \beta_1 x + \beta_1 = E(Y| x ) + \beta_1
  $$

-  Além disso, a variabilidade de `\(Y\)`, em um valor particular de `\(x\)`, é determinada pela variância do erro `\(\sigma^2\)`:

  $$
    Var(Y|x) = Var(\beta_0 + \beta_1 x + \epsilon) = Var(\beta_0 + \beta_1 x)  + Var(\epsilon) = 0 + \sigma^2 = \sigma^2
    $$

- Isso implica que há uma distribuição de valores de `\(Y\)` em cada `\(x\)` e que a variância dessa distribuição é a mesma em cada `\(x\)`.

---

## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

-  Na maioria dos problemas reais, os valores dos **coeficientes angular e linear** ( `\(\beta_0\)`  e `\(\beta_1\)` ) e a variância do erro `\(\sigma^2\)` não serão conhecidos **e devem ser estimados a partir dos dados da amostra**.

-  Então, o modelo ajustado de regressão é tipicamente usada na previsão de observações futuras de `\(Y\)` ou para estimar a resposta média em um nível particular de `\(x\)`. Tal como no exemplo anterior em que o engenheiro químico estava interessado em estimar a pureza média de oxigênio produzido, quando o nível de hidrocarboneto for `\(x = 1,25\%\)`.


---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Estimação**

-  Considere que cada observação, `\(Y\)`, possa ser descrita pelo modelo

$$
Y = \beta_0 + \beta_1 x + \epsilon,
$$
em que `\(\epsilon\)` é um erro aleatório com média zero e variância (desconhecida) `\(\sigma^2\)`. 

-  Na estimação de `\(\beta_0\)` e `\(\beta_1\)`, as estimativas de `\(\beta_0\)` e `\(\beta_1\)` devem resultar em uma linha que seja (em algum sentido) o "melhor ajuste" para os dados.

- *O cientista alemão Karl* **Gauss** *(1777-1855) propôs estimar os parâmetros `\(\beta_0\)` e `\(\beta_1\)` de modo a minimizar a soma dos quadrados dos desvios dos valores observados em relação aos valores estimados.*

-  Chamamos esse critério para estimar os coeficientes de regressão de **método dos mínimos quadrados**.


---

## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Estimação**

-  Suponha que tenhamos `\(n\)` pares de observações `\((x_1, y_1)\)`, `\((x_2, y_2)\)`, `\(\cdots\)`, `\((x_n, y_n)\)`.

-  O modelo de regressão linear simples pode ser expresso por
$$
Y_i = \beta_0 + \beta_1 x_i + \epsilon_i, \quad \quad i = 1,2,\cdots, n.
$$

-  A soma dos quadrados dos desvios das observações em relação ao valor estimado (soma dos quadrados dos resíduos ou erros) é dada por

`\begin{align*}
L = \sum_{i = 1}^n \epsilon_i ^2 = \sum_{i = 1}^n \left( Y_i - \beta_0 - \beta_1 x_i    \right)^2.
\end{align*}`

---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Estimação**

-  Os estimadores de mínimos quadrados de `\(\beta_0\)` e `\(\beta_1\)`, isto é, `\(\hat{\beta}_0\)` e `\(\hat{\beta}_1\)`, satisfazem

`\begin{align*}
{\left. {\frac{{\partial L}}{{\partial {\beta _0}}}} \right|_{{{\hat \beta }_0},{{\hat \beta }_1}}} = &amp;  - 2\sum\limits_{i = 1}^n {\left( {{y_i} - {{\hat \beta }_0} - {{\hat \beta }_1}{x_i}} \right) } = 0 \\
{\left. {\frac{{\partial L}}{{\partial {\beta _1}}}} \right|_{{{\hat \beta }_0},{{\hat \beta }_1}}} = &amp; - 2\sum\limits_{i = 1}^n {\left( {{y_i} - {{\hat \beta }_0} - {{\hat \beta }_1}{x_i}} \right){x_i} }= 0.
\end{align*}`

-  A simplificação dessas duas equações resulta em
`\begin{align*}
&amp; n{{\hat \beta }_0} + {{\hat \beta }_1}\sum\limits_{i = 1}^n {{x_i}}  = \sum\limits_{i = 1}^n {{y_i}} \\
&amp; {{\hat \beta }_0}\sum\limits_{i = 1}^n {{x_i}}  + {{\hat \beta }_1}\sum\limits_{i = 1}^n {x_i^2}  = \sum\limits_{i = 1}^n {{y_i}{x_i}}
\end{align*}`

-  A solução para essas equações resulta nos **estimadores de mínimos quadrados**
`\({{\hat \beta }_0}\)`  e `\({{\hat \beta }_1}\)`.

---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Estimativas de mínimos quadrados**

As **estimativas de mínimos quadrados** dos coeficientes angular e linear no modelo de regressão linear simples são

`\begin{align*}
&amp; {{\hat \beta }_0} = \bar Y - {{\hat \beta }_1}\bar x \\
&amp; {{\hat \beta }_1} = \frac{{\sum\limits_{i = 1}^n {{Y_i}{x_i}}  - \frac{{\left( {\sum\limits_{i = 1}^n {{x_i}} } \right)\left( {\sum\limits_{i = 1}^n {{Y_i}} } \right)}}{n}}}{{\sum\limits_{i = 1}^n {x_i^2}  - \frac{{{{\left( {\sum\limits_{i = 1}^n {{x_i}} } \right)}^2}}}{n}}} = \frac{S_{Yx}}{S_{xx}},
\end{align*}`
em que `\(\bar{Y} = \sum_{i = 1}^n Y_i / n\)`, `\(\bar{x} = \sum_{i = 1}^n x_i / n\)`,
`\(S_{xx} = \sum_{i = 1}^n \left(x_i - \bar{x}\right)^2 = {\sum\limits_{i = 1}^n {x_i^2}  - \frac{{{{\left( {\sum\limits_{i = 1}^n {{x_i}} } \right)}^2}}}{n}}\)` e `\(S_{Yx} = \sum_{i = 1}^n \left(Y_i - \bar{Y}\right) \left(x_i - \bar{x}\right) = {\sum\limits_{i = 1}^n {{Y_i}{x_i}}  - \frac{{\left( {\sum\limits_{i = 1}^n {{x_i}} } \right)\left( {\sum\limits_{i = 1}^n {{Y_i}} } \right)}}{n}}\)`.

## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Estimativas de mínimos quadrados**


- O modelo de regressão ajustado (ou estimado) é

$$
  \hat{y} = \hat{\beta}_0 + \hat{\beta}_1 x,
$$

sendo `\(\hat{y}\)` o estimador da média da variável `\(Y\)` para um valor de `\(x\)` ( `\(\hat{y} = \widehat{E(Y|x)}\)` ).

---
.blockgreen[ ## Exemplo (Pureza de Oxigênio)

Ajustaremos um modelo de regressão linear simples aos dados de Pureza de Oxigênio.

`\begin{align*}
&amp; n = 20, \quad \quad \sum_{i = 1}^{20} x_i = 23,92, \quad \quad \sum_{i = 1}^{20} y_i = 1.843,21 \\
&amp; \bar{x} = 1,1960, \quad \quad \bar{y} = 92,1605 \\
&amp; \sum_{i = 1}^{20} x_i^2 = 29,2892, \quad \quad \sum_{i = 1}^{20} = x_i y_i = 2.214,6566 
\end{align*}`

]

---
.blockgreen[ ## Exemplo (Pureza de Oxigênio)
`\begin{align*}
&amp; S_{xx} = {\sum\limits_{i = 1}^{20} {x_i^2}  - \frac{{{{\left( {\sum\limits_{i = 1}^{20} {{x_i}} } \right)}^2}}}{20}} = 29,2892 - \frac{(23,92)^2}{20} = 0,68088 \\
&amp; S_{xy} = {\sum\limits_{i = 1}^{20} {{y_i}{x_i}}  - \frac{{\left( {\sum\limits_{i = 1}^{20} {{x_i}} } \right)\left( {\sum\limits_{i = 1}^{20} {{y_i}} } \right)}}{20}} \\
&amp; \quad \quad \quad = 2.214,6566 - \frac{(23,92)(1.843,21)}{20} = 10,17744
\end{align*}`

]

---
.blockgreen[ ## Exemplo (Pureza de Oxigênio)

Logo, as estimativas de mínimos quadrados dos coeficientes angular e linear são

`\begin{align*}
&amp; \hat{\beta}_1 = \frac{S_{xy}}{S_{xx}} = \frac{10,17744}{0,68088} = 14,94748 \\
&amp; \hat{\beta}_0 = \bar{y} - \hat{\beta}_1 \bar{x} = 92,1605 - (14,94748) 1,196 = 74,28331
\end{align*}`

O modelo ajustado da regressão linear simples é

$$
  \hat{y} = 74,283 + 14,947 x.
  $$

]

## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>


**Estimando `\(\sigma^2\)`**

-  Há outro parâmetro desconhecido no modelo de regressão, `\(\sigma^2\)` (a variância do erro aleatório `\(\epsilon\)`).

-  Os resíduos, `\(\hat{\epsilon} = e_i = y_i - \hat{y}_i\)`, são usados no cálculo da estimativa de `\(\sigma^2\)`.

-  A **soma dos quadrados dos resíduos**, frequentemente chamada de soma dos quadrados dos erros, é

`\begin{align*}
SQ_E = \sum_{i = 1}^n e_i^2 = \sum_{i = 1}^n (y_i - \hat{y_i})^2.
\end{align*}`

-  **Uma forma mais simples de calcular a `\(SQ_E\)` é**
`\begin{align*}
SQ_E = SQ_T - \hat{\beta}_1 S_{xy},
\end{align*}`
em que `\(SQ_T = \sum_{i = 1}^n y_i^2  - n \bar{y}^2\)`

---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Estimando `\(\sigma^2\)`**


-  O estimador de `\(\sigma^2\)` é dado por
`\begin{align*}
\hat{\sigma}^2 = QM_E = \frac{SQ_E}{n-2},
\end{align*}`

em que `\(QM_E\)` é chamado de quadrado médio dos resíduos.


---
.blockgreen[ ## Exemplo (Pureza de Oxigênio)

A estimativa de `\(\sigma^2\)` é calculada por

`\begin{align*}
&amp; \sum_{i = 1}^{20} y_i^2 = 170.044,5321 \\
&amp; SQ_T = \sum_{i = 1}^{20} y_i^2 - n \bar{y}^2 = 170.044,5321 - 20 \times 92,1605^2 = 173,3769 \\
&amp; SQ_E = SQ_T - \hat{\beta}_1 S_{xy} = 173,3769 -  14,947 \times 10,17744 = 21,2547 \\
&amp; \hat{\sigma}^2 = QM_E = \frac{21,2547}{20 - 2} =  1,180817
\end{align*}`

Portanto, uma estimativa para `\(\sigma^2\)` é
$$
\hat{\sigma}^2 =  1,180817
$$

]

## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Análise de variância para testar significância da regressão**

-  Um método chamado **análise de variância** pode ser usado para testar a significância da regressão.

-  O procedimento divide a variabilidade total na variável resposta em várias componentes.

`\begin{align*}
\sum_{i = 1}^n \left(Y_i - \bar{Y} \right)^2 = \sum_{i = 1}^n \left(\hat{Y}_i - \bar{Y}  \right)^2 + \sum_{i = 1}^n \left(Y_i - \hat{Y}_i  \right)^2
\end{align*}`

-  Os dois componentes do lado direito medem, respectivamente, a quantidade da variabilidade em `\(Y_i\)`, por causa da linha de regressão, e a variação residual deixada sem explicação pela linha de regressão.

-  `\(SQ_E = \sum_{i = 1}^n (Y_i - \hat{Y}_i  )^2\)` é a **soma dos quadrados dos erros**, `\(SQ_{Reg} = \sum_{i = 1}^n (\hat{Y}_i - \bar{Y} )^2\)` é **soma dos quadrados da regressão** e `\(SQ_T = \sum_{i = 1}^n (Y_i - \bar{Y})^2\)` é a **soma dos quadrados total** corrigida.

`\begin{align*}
SQ_T = SQ_{Reg} + SQ_E
\end{align*}`




---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Análise de variância para testar significância da regressão**

-  Para as hipóteses (regressão linear **simples**)

`\begin{align*}
H_0: \beta_1 = 0 \quad { \text{versus}  } \quad H_1: \beta_1 \neq 0
\end{align*}`

tem-se a estatística de teste

`\begin{align*}
F_c = \frac{SQ_{Reg} / 1}{SQ_E /(n - 2) } = \frac{QM_{Reg}}{QM_{E}},
\end{align*}`

em que `\(QM_{Reg} = SQ_{Reg}/1\)` é o quadrado médio de regressão e `\(QM_{E} = SQ_{E}/(n-2)\)` é o quadrado médio dos erros.

-  **Decisão:** Rejeita-se `\(H_0\)` se `\(F_c &gt; F_{(1; n-2; \alpha)}\)`.

-  O procedimento de teste é geralmente esquematizado em uma **tabela de análise de variância**.

## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Teste t para testar significância do coeficiente `\(\beta_1\)`**

-  Suponha que desejemos testar a hipótese de o **coeficiente angular** `\(\beta_1\)` ser igual a uma constante, como `\(\beta_{1,0}\)`. As hipóteses apropriadas são

`\begin{align*}
H_0: \beta_1 = \beta_{1,0} \quad { \text{versus}  } \quad H_1: \beta_1 \neq \beta_{1,0}
\end{align*}`

-  Estatística de teste
`\begin{align*}
T_c = \frac{\hat{\beta_1} - \beta_{1,0}}{ep(\hat{\beta}_1)},
\end{align*}`

em que `\(ep(\hat{\beta}_1) = \sqrt{\hat{\sigma}^2/S_{xx}}\)` é o **erro-padrão** do estimador `\(\hat{\beta}_1\)`.

-  **Decisão:** Rejeita-se `\(H_0\)` se `\(|T_c| &gt; t_{(\alpha/2, n-2)}\)`

## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**IC para inclinação e interseção**

Sob a suposição de que as observações sejam normal e independentemente distribuídas, um intervalo de confiança de `\(100(1 - \alpha)\%\)` para o coeficiente angular `\(\beta_1\)` na regressão linear simples é

`\begin{align*}
IC_{1 - \alpha}(\beta_1): \left( \hat{\beta}_1 - t_{(n - 2; \alpha/2)} ep(\hat{\beta}_{1});
\hat{\beta}_1 + t_{(n - 2; \alpha/2)} ep(\hat{\beta}_{1})  \right)
\end{align*}`

Similarmente, um intervalo de confiança de `\(100(1 - \alpha)\%\)` para o coeficiente linear `\(\beta_0\)` é

`\begin{align*}
IC_{1 - \alpha}(\beta_0): \left( \hat{\beta}_0 - t_{(n - 2; \alpha/2)} ep(\hat{\beta}_{0}); \hat{\beta}_0 + t_{(n - 2; \alpha/2)} ep(\hat{\beta}_{0})  \right)
\end{align*}`


---
.blockgreen[ ## Exemplo (Pureza de Oxigênio)

**Obter `\(IC_{95\%}(\beta_0)\)` e `\(IC_{95\%}(\beta_1)\)`**

**Cálculos:**

- `\(IC_{95\%}(\beta_0)\)`:

- `\(ep(\hat{\beta}_0) = \sqrt{\hat{\sigma}^2(1/n + \bar{x}^2/S_{xx})}= \sqrt{1,181 (1/20 + 1,196^2/0,681)} = 1,593\)`

- `\(\hat{\beta_0} = 74,283\)`

- `\(t_{(2,5\%, 18)} = 2,1\)`

`\begin{align*}
&amp; IC_{95\%}(\beta_0): \left( \hat{\beta}_0 - t_{(2,5\%, 18)} ep(\hat{\beta}_{0}); \hat{\beta}_0 + t_{(2,5\%, 18)} ep(\hat{\beta}_{0})  \right) = \left( 74,283 - 2,1 \times 1,593; 74,283 + 2,1 \times 1,593  \right) \\
&amp; IC_{95\%}(\beta_0):\left( 70,94  ; 77,63\right)
\end{align*}`

## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**IC para a Resposta Média**

Sob a suposição de que as observações sejam normal e independentemente distribuídas, um intervalo de confiança de `\(100(1 - \alpha)\%\)` para a resposta média no valor de `\(x = x_0\)`, ou seja `\(\hat{Y}(x_0) = \mu_{Y|x_0} = \beta_0 + \beta_1 x_0\)`, é dado por

`\begin{align*}
IC_{1 - \alpha}\left(\hat{Y}(x_0)\right):  \left( \hat{Y}(x_0) - t_{(n - 2; \alpha/2)} ep\left(\hat{Y}(x_0)\right); \ \  \hat{Y}(x_0) + t_{(n - 2; \alpha/2)} ep\left(\hat{Y}(x_0)\right)  \right),
\end{align*}`
em que

`\begin{align*}
ep\left(  \hat{Y}(x_0) \right) = \sqrt{\hat{\sigma}^2 \left[\frac{1}{n}  + \frac{(x_0 - \bar{x})^2}{S_{xx}} \right]  }
\end{align*}`

**OBS:** `\(x_0\)` é um valor utilizado no ajuste do modelo de regressão.



---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**IC da previsão de novas observações**

-  Uma aplicação importante de um modelo de regressão é prever novas ou futuras observações `\(Y\)`, correspondentes a um valor especificado do regressor `\(x\)`. Se `\(x_0\)` for o valor de interesse do regressor, então `\(\hat{Y}(x_0) = \hat{\beta}_0 + \hat{\beta}_1 x_0\)`
será a estimativa do novo ou futuro valor da resposta `\(Y(x_0)\)`.


-  Um intervalo de previsão de `\(100(1 - \alpha)\%\)` para uma observação futura `\(Y(x_0)\)`, em certo valor `\(x_0\)`, é dado por
`\begin{align*}
IC_{1 - \alpha}\left(\hat{Y}(x_0)\right):  \left( \hat{Y}(x_0) - t_{(n - 2; \alpha/2)} ep\left(\hat{Y}(x_0)\right); \ \  \hat{Y}(x_0) + t_{(n - 2; \alpha/2)} ep\left(\hat{Y}(x_0)\right)  \right),
\end{align*}`
em que

`\begin{align*}
ep\left(  \hat{Y}(x_0) \right) = \sqrt{\hat{\sigma}^2 \left[1 + \frac{1}{n}  + \frac{(x_0 - \bar{x})^2}{S_{xx}} \right]  }
\end{align*}`

**OBS:** `\(x_0\)` é um valor **não** utilizado no ajuste do modelo de regressão.

## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Coeficiente de determinação ( `\(R^2\)` )**

-  Uma medida largamente usada para um modelo de regressão é a razão entre somas dos quadrados.
`\begin{align*}
R^2 = \frac{SQ_{Reg}}{SQ_T} = 1 - \frac{SQ_E}{SQ_T}
\end{align*}`

-  O coeficiente é frequentemente usado para julgar a adequação de um modelo de regressão.

-  Frequentemente `\(R^2\)` é referido como a quantidade de variabilidade nos dados explicada ou considerada pelo modelo de regressão.

$$

- isto é, o modelo explica `\(87,7\%\)` da variabilidade dos dados.

## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Coeficiente de determinação ( `\(R^2\)` )**

-  A estatística `\(R^2\)` deve ser usada com cuidado, porque é sempre possível fazer `\(R^2\)` ser unitário adicionando termos suficientes ao modelo.

- Por exemplo, podemos obter um ajuste "perfeito" para os `\(n\)` pontos com um polinômio de grau `\(n - 1\)`.





---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>


**Análise de Resíduos**

-  Os resíduos de um modelo de regressão são `\(e_i = y_i - \hat{y}_i\)`, `\(i = 1, 2, \cdots, n\)`, em que `\(y_i\)` é uma observação real e `\(\hat{y}_i\)` é o valor ajustado correspondente, proveniente do modelo de regressão.


-  A análise dos resíduos é frequentemente útil na verificação da suposição de que os erros sejam distribuídos de forma aproximadamente **normal**, com **variância constante** e **independentes**.

- Além disso, na verificação da necessidade em adicionar mais termos no modelo.

-  **Normalidade:** uma verificação aproximada da normalidade pode ser pela construção de um **histograma de frequência** dos resíduos ou um **gráfico de probabilidade normal** (ou gráfico de quantil-quantil) dos resíduos.




---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Análise de Resíduos**

-  **Normalidade:** Podemos também padronizar os resíduos, calculando `\(d_i = e_i / \sqrt{\sigma^2}\)`, `\(i = 1, 2, \cdots, n\)`. Se os erros forem distribuídos normalmente, então aproximadamente `\(95\%\)` dos resíduos padronizados devem cair no intervalo `\((-2, +2)\)`. Os resíduos que estiverem bem fora desse intervalo podem indicar a presença de um outlier; ou seja, uma observação que não é típica do resto dos dados.




---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Análise de Resíduos**

É frequentemente útil plotar os resíduos

- em uma sequência temporal (se conhecida), 



- contra os valores de `\(\hat{y}_i\)` e 


- contra a variável independente `\(x\)`.


---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Análise de Resíduos**

Figura. Padrões de comportamento para gráficos dos resíduos. (a) Satisfatório, (b) Funil, (c) Arco duplo, (d) Não linear.



---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>
**Análise de Resíduos**

-  O padrão (a) representa a situação ideal, enquanto os padrões (b), (c) e (d) representam anomalias.
-  Se os resíduos aparecerem como em (b), a variância das observações pode estar crescendo com o tempo ou com a magnitude de `\(y_i\)` ou `\(x_i\)`. Transformação de dados na resposta `\(y_i\)` é frequentemente usada para eliminar esse problema. As transformações largamente usadas para estabilizar a variância incluem o uso de `\(\sqrt{y}\)`, `\(\log(y)\)`  ou `\(1/y\)` como a resposta.
-  Gráficos de resíduos contra `\(\hat{y}_i\)` e `\(x_i\)` que pareçam com (c) também indicam desigualdade de variância.
-  Gráficos residuais que pareçam com (d) indicam modelo não adequado; isto é, termos de ordens maiores devem ser adicionados ao modelo, uma transformação sobre a variável `\(x\)` ou a variável `\(y\)` (ou ambas) deve ser considerada, ou **outros regressores devem ser adicionados**.








---
## Regressão Linear Simples <i class="fas  fa-chart-line fa-pull-right "></i>

**Análise de Resíduos**

- A análise de resíduos pode ser feita também utilizando-se testes de hipóteses adequados. Os mais comuns são:

-  **Normalidade:** Teste de Shapiro-Wilk, `\(H_0:\)` **Os dados são normais**.
-  **Independência:** Teste de Durbin-Watson, `\(H_0:\)` **Os dados são independentes**.
-  **Homogeneidade de variâncias (homocedasticidade):** Teste de Breusch-Pagan, `\(H_0:\)` **As variâncias são homogêneas**.



**OBS**: Há outros testes para normalidade, independência e homocedasticidade!

&lt;!-- ## Regressão linear múltipla <i class="fas  fa-chart-line fa-pull-right "></i> --&gt;

&lt;!-- - Modelo --&gt;
&lt;!-- $$ --&gt;
&lt;!--   Y = \beta_0 + \beta_1 x_1 + \beta_2 x_2 + \cdots + \beta_p x_p + \epsilon --&gt;
&lt;!-- $$ --&gt;
&lt;!-- - `\(Y\)` é a variável resposta (variável dependente), --&gt;

&lt;!-- - `\(x_1, x_2, \cdots, x_p\)` são as variáveis independentes (ou regressoras ou explicativas ou covariáveis), --&gt;

&lt;!-- - `\(\beta_0, \beta_1, \beta_2, \cdots, \beta_p\)` são os `\(p+1\)` parâmetros do modelo (ou coeficientes do modelo de regressão) --&gt;


&lt;!-- - `\(\epsilon\)` são variáveis aleatórias independentes, normais de média zero e variância constante `\(\sigma^2\)`. --&gt;

&lt;!-- **Interpretação:** --&gt;

&lt;!-- `\(\beta_1\)` representa a variação média em `\(Y\)` para a  variação de uma unidade em `\(x_1\)` quando todas as outras variáveis explicativas, `\(x_2, x_3, \cdots, x_p\)` forem constantes --&gt;


&lt;!-- **Obs:** é possível definir modelos polinomiais: --&gt;

&lt;!-- $$ --&gt;
&lt;!--   Y = \beta_0 + \beta_1 x + \beta_2 x^2 + \cdots + \beta_p x^p + \epsilon --&gt;
&lt;!-- $$ --&gt;


---
## Regressão linear múltipla <i class="fas  fa-chart-line fa-pull-right "></i>



- Muitas aplicações da análise de regressão envolvem situações em que há mais de um regressor.

- Um modelo de regressão que contenha mais de um regressor é chamado de **modelo de regressão múltipla**.

- Um modelo de regressão múltipla com duas covariáveis é do tipo:
$$
Y = \beta_0 + \beta_1 x_1 + \beta_2  x_2 + \epsilon
$$
em que `\(Y\)` é a variável resposta, `\(x_1\)` e `\(x_2\)` são as covariáveis, `\(\beta_1\)` e `\(\beta_2\)` são os parâmetros e `\(\epsilon\)` é um termo aleatório.



---
## Regressão linear múltipla <i class="fas  fa-chart-line fa-pull-right "></i>


-  Em geral, a variável dependente (ou resposta), `\(Y\)`, pode estar relacionada com `\(p\)` variáveis independentes ou regressoras.

- O modelo
$$
Y = \beta_0 + \beta_1 x_1 + \beta_2 x_2 + \cdots + \beta_p x_p + \epsilon
$$
é chamado de modelo de regressão linear múltipla com `\(p\)` variáveis regressoras. 
Os  parâmetros `\(\beta_j\)`, `\(j = 0, 1, 2, \cdots, p\)`, são chamados de coeficientes de regressão (**OBS:** o modelo possui `\(p+1\)` parâmetros). 

-  O parâmetro `\(\beta_j\)` representa a variação esperada na resposta `\(Y\)` por unidade de variação unitária em `\(x_j\)`, quando todos os outros regressores restantes `\(x_i\)` ( `\(i \neq j\)` ) forem mantidos constantes.

-  Modelos de regressão linear múltipla são frequentemente usados como funções de aproximações. Isto é, a verdadeira relação funcional entre `\(Y\)` e `\(x_1, x_2, x_3,  \cdots, x_p\)` é desconhecida; porém, em certas faixas das variáveis independentes, o modelo de regressão linear é uma aproximação adequada.



---
## Regressão linear múltipla <i class="fas  fa-chart-line fa-pull-right "></i>


- É possível definir modelos polinomiais. Por exemplo, o modelo polinomial cúbico com uma variável regressora é:
$$
Y = \beta_0 + \beta_1 x^1 + \beta_2 x^2 + \beta_3 x^3 + \epsilon
$$

Note que: `\(x_1 = x^1\)`, `\(x_2 = x^2\)`, `\(x_3 = x^3\)`.


---
## Regressão linear múltipla <i class="fas  fa-chart-line fa-pull-right "></i>



- Os modelos de regressão podem incluir **efeitos de interação**, que é quando o efeito de uma variável independente depende do nível de outra variável independente.

- A interação entre duas variáveis pode ser representada por um termo de produto cruzado no modelo, tal como

`$$Y = \beta_0 + \beta_1 x_1 + \beta_2 x_2 + \beta_{12} x_1 x_2 + \epsilon$$`

Note que: `\(x_3 = x_1 x_2\)` e `\(\beta_3 = \beta_{12}\)` .



---

## Regressão linear múltipla em experimentos <i class="fas  fa-chart-line fa-pull-right "></i>

**Experimento parcela subdividida**


- Um experimento avaliou o peso do pulmão (g) de ratos em duas dietas de vitamina A (moderada e suficiente) e em 5 períodos após o início da dieta.

- 60 ratos Lister Hooded foram distribuídas em 12 gaiolas (5 ratos em cada gaiola).

- Cada gaiola foi aleatorizada a uma das dietas, totalizando 6 gaiolas por dieta.

- **Em cada um dos tempos 10, 15, 20, 25 e 30, um animal por gaiola era sacrificado e o peso do pulmão era mensurado. **

- Nesse experimento as gaiolas (dietas de vitamina A) são as parcelas e os animais (tempo) são as subparcelas.

- O experimento foi realizado em DIC.


- Arquivo com os dados: [dados_peso_pulmao_ratos_subdivididas_dic.xlsx](docs_aula11/dados_peso_pulmao_ratos_subdivididas_dic.xlsx)

**Exemplo 11.2 de Sampaio (2015)**
 
- Avaliar a motilidade observada no sêmen em função de 3 diluentes (A, B e C) e 3 tempos de conservação (8, 24 e 36h) a `\(5^\circ C\)`.

- Cinco jumentos (blocos) foram utilizados.

**parcela:** diluente

**subparcela:** tempo de conservação

## Regressão logística <i class="fas  fa-chart-line fa-pull-right "></i>

**Fonte: [https://smolski.github.io/livroavancado/](https://smolski.github.io/livroavancado)**

.scroll-box-20[


O modelo de regressão logística é utilizado quando a variável dependente é binária, categórica ordenada ou mesmo categórica desordenada (quando não há relação hierárquica entre elas).



&lt;img src="docs_aula12/reg_log1.jpg" width="50%" style="display: block; margin: auto;" /&gt;

]

---

.scroll-box-20[

- A previsão da variável dependente (probabilidades) depende dos coeficientes logísticos e das variáveis independentes escolhidas ao modelo

- Para a estimação dos coeficientes das variáveis independentes, são utilizados os valores logit:


$$
logit = \log\left( \frac{prob}{1 - prob} \right) = \beta_0 + \beta_1 x_1 + \cdots + \beta_p x_p
$$
**ou**
$$
 \frac{prob}{1 - prob}  = e^{\beta_0 + \beta_1 x_1 + \cdots + \beta_p x_p}
$$

]

---

.scroll-box-20[

- A regressão logística utiliza a curva logística para representar a relação entre a variável dependente (binária) e as independentes.

- Os valores preditos são probabilidades (valores entre 0 e 1), sendo definidos pelos coeficientes estimados.

&lt;img src="docs_aula12/reg_log2.jpg" width="50%" style="display: block; margin: auto;" /&gt;


]



---
## Regressão logística simples <i class="fas  fa-chart-line fa-pull-right "></i>

.scroll-box-20[

- Somente uma variável independente.

- Dados do livro de Hosmer e Lemeshow (2000):

- Amostra com 100 pessoas.

- Variável dependente: ocorrência ou não (1 ou 0) de doença coronária cardíaca (CHD).

- Variável independente: idade (AGE) dos indivíduos.




```r
library(openxlsx)
dados &lt;- read.xlsx("dados_chd_regressao_logistica.xlsx")

head(dados)
```

```
##   AGE AGRP CHD
## 1  20    1   0
## 2  23    1   0
## 3  24    1   0
## 4  25    1   0
## 5  25    1   1
## 6  26    1   0
```

]

---



```r
library(ggplot2)

ggplot(dados, aes(x=AGE, y=CHD)) + 
  geom_point() + 
  stat_smooth(method="glm", method.args=list(family="binomial"), se=FALSE)
```

&lt;img src="aula12_files/figure-html/unnamed-chunk-59-1.png" width="30%" style="display: block; margin: auto;" /&gt;




---

.scroll-box-20[

$$
 \log\left(\frac{prob_{CHD}}{1 - prob_{CHD}}\right)  = \beta_0 + \beta_1 AGE
$$



```r
modelo &lt;- glm(CHD ~ AGE, family = binomial(link="logit"),
              data = dados)
modelo
```

```

---

.scroll-box-20[

- Intercepto ( `\(\beta_0\)` ) é igual a -5,309, sendo que para a análise aqui proposta da relação entre CHD e AGE não obtém-se um significado prático.

- A variável de interesse é idade, que no modelo de regressão obteve o coeficiente de 0,1109.

- Pelo fato de `\(\beta_1 = 0,1109\)` ser positivo, quando a idade (AGE) aumenta, elevam-se as chances de ocorrência de CHD.


]

---


- O modelo pode ser utilizado para predizer todas as probabilidades em relação das idades



```r
# Criando a coluna prob no banco de dados
dados$prob &lt;- predict(modelo, type="response")

# Plotando as probabilidades preditas pelo modelo
ggplot(dados, aes(x=AGE, y=prob)) + 
  geom_point() +
  geom_line()
```

&lt;img src="aula12_files/figure-html/unnamed-chunk-61-1.png" width="30%" style="display: block; margin: auto;" /&gt;


---

.scroll-box-20[

**Estimando a Razão de Chances**

- O modelo de regressão logística traz os resultados dos estimadores na forma logarítma, ou seja, **o log das chances da variável idade no modelo é 0,1109**.

- Para uma interpretação mais enriquecida da relação da idade com a CHD é necessária a transformação deste coeficiente: exponenciação da(s) variavel(eis) da regressão.

$$
\frac{prob}{1 - prob} = OR  = e^{\beta_1} = e^{0,1109} = 1,1173
$$

- O resultado da razão de chances da variável AGE foi de 1,1173.

- Para cada variação unitária na idade (AGE), as chances de ocorrência de CHD aumentam 1,1173 vezes. 

- Dito de outra forma, para cada variação unitária em AGE, aumentam-se `\(11,73\% = (1,1173-1)\times 100\)` as chances da ocorrência de CHD.

]

---

**Teste Hosmer e Lemeshow**

.scroll-box-20[

- O teste de Hosmer e Lemeshow é utilizado para avaliar a qualidade do ajuste do modelo (**se o modelo pode explicar os dados observados**).

- Para este teste, os dados são divididos de acordo com as probabilidades previstas em 10 grupos iguais, sendo que os números previstos e os reais são comparados com a estatística qui-quadrado.

A hipótese nula `\(H_0\)`  deste teste é a de que as proporções observadas e esperadas são as mesmas ao longo da amostra.


```r
library(ResourceSelection)
hl=hoslem.test(dados$CHD, fitted(modelo), g=10)
hl
```

```
## 
## 	Hosmer and Lemeshow goodness of fit (GOF) test
## 
## data:  dados$CHD, fitted(modelo)
## X-squared = 2.2243, df = 8, p-value = 0.9734
```

]
