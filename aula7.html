## Introdução ao PAE

.blockquote[

O **planejamento de experimentos** refere-se ao processo de planejar um experimento de tal forma que os dados coletados são adequados para obter resultados confiáveis de análises estatísticas.

]


.blockquote[ ## Conceitos básicos:

- **Fator:** variável cujo efeito deseja-se avaliar no experimento.

- **Tratamento:** é o que se quer estudar, pode ser as combinações dos níveis dos fatores.
				
- **Variável resposta:** característica que é mensurada.
				
- **Parcela:** é a unidade experimental que recebe um tratamento.
				
- **Repetição:** número de vezes que um tratamento é aplicado.
				
- **Delineamento:** modo como os tratamentos são designados às unidades experimentais.
				
- **Bloco:** conjunto de unidades experimentais homogêneas.

]

---

## Introdução ao PAE

.blockgreen[ ## Exemplo

Em um experimento com suínos, deseja-se comparar quatro rações ( `\(A\)`, `\(B\)`, `\(C\)`, `\(D\)` ) e duas doses de vitaminas ( `\(2\)` e `\(4mg\)` ). Há 30 animais disponíveis para o experimento, sendo 18 com pesos aproximados em `\(16kg\)` e os demais com pesos aproximados em `\(8kg\)`. A parcela é constituída por um animal e a variável respota foi o ganho de peso, em `\(kg\)`, dos animais após 30 dias do início do experimento.

- Descreva:

**fatores**, **tratamentos**, **parcela**, **bloco**, **número de repetições**,  **variável resposta** e *delineamento*.


]

---


## Introdução ao PAE: planejamento de experimentos

.blockquote[

**delineamentos experimentais**

- Delineamento inteiramente casualizado (DIC)
- Delineamento em blocos casualizados (DBC)
- Delineamento quadrado latino (DQL)
- Os três delineamentos (DIC, DBC, DQL) constituem os delineamentos básicos, mas existem vários outros, tais como:
blocos incompletos, quadrado greco-latino, ...

]

## Introdução ao PAE: comparações simples


.blockquote[ ## Teste de hipóteses


**Para testar uma hipótese:**

1. Definir as hipóteses (nula e alternativa)

2. Obter uma amostra aleatória das populações

3. Calcular uma estatística de teste (região crítica)

4. Tomar uma decisão: rejeitar ou não rejeitar `\(H_0\)`.

]

## Delineamento inteiramente casualizado (DIC)

.blockgreen[ ## Supressão do crescimento bacteriano em carnes armazenadas

- A vida útil das carnes armazenadas é o tempo que um corte previamente embalado é saudável, nutritivo e vendável.

- Um pacote normal exposto ao ar ambiente tem uma vida útil de aproximadamente 48 horas, após esse período a carne começa a deteriorar-se devido à contaminação de micróbios, à degradação da cor e encolhimento. - Embalagem a vácuo é eficaz para suprimir o desenvolvimento
de micróbios; no entanto, os outros aspectos continuam sendo um problema.

]

---


.blockgreen[ ## Supressão do crescimento bacteriano...

- Alguns estudos sugerem atmosferas controladas de gás, como alternativa à embalagem atual.

- Duas atmosferas que prometem combinar a capacidade de suprimir o desenvolvimento de micróbios com a conservação das qualidades da carne são: 

**(1)** dióxido de carbono puro (CO) e 

**(2)** misturas de monóxido de carbono (CO), oxigênio (O) e nitrogênio (N).

]
---





.blockgreen[ ## Supressão do crescimento bacteriano...

- **Hipótese de pesquisa:** Com base nessa nova informação, o pesquisador
levanta a hipótese de que alguma forma de atmosfera controlada fornecerá
um ambiente de embalagem mais eficaz para o armazenamento de carne.

- **Tratamentos:**

**(1)** ar ambiente com embalagens plásticas comerciais

**(2)** vácuo

**(3)** uma mistura de gases com `\(1\%\)` de `\(CO\)`, `\(40\%\)` `\(O_2\)` e `\(59\%\)` `\(N\)` e 

**(4)** `\(100\%\)` `\(CO_2\)`.


- Embalagem com ar ambiente e vácuo servem como **tratamentos de controle**, pois ambos são padrões com os quais a eficácia pode ser comparada com a da nova embalagem.

]

---




.blockgreen[ ## Supressão do crescimento bacteriano...


**Planejamento experimental:**

- Um **delineamento inteiramente casualizado** foi utilizado para o experimento.

- Cada conjunto de condições de embalagem foi atribuído aleatoriamente a 3 cortes do mesmo tamanho (75 g).

- Cada corte foi embalado separadamente nas condições atribuídas.

- A eficácia de cada tratamento é avaliada para suprimir o desenvolvimento bacteriano.

- Após 9 dias de armazenamento a 4ºC em uma instalação normal, o número de bactérias psicotrópicas na carne foi medido.

- **Bactérias psicotrópicas** são encontradas na superfície da carne e estão associadas a carne deteriorada.

]

.blockquote[ ## Aleatorização dos tratamentos no DIC

- Os cortes de carne utilizados para o experimento eram unidades experimentais relativamente homogêneas e um DIC foi utilizado para evitar a atribuição subjetiva de tratamentos aos cortes.

- O procedimento de aleatorização apropriado para o DIC é ilustrado com o estudo do armazenamento de carne:

**Passo 1:** Atribuir a sequência de números de 1 a 12 para as unidades experimentais, os cortes de carne.

**Passo 2:** Obter uma permutação aleatória dos números de 1 a 12. Suponha que a permutação ordenada seja:

$$
1 \ 6 \ 7 \ 12 \ 5 \ 3 \ 10 \ 9 \ 2 \ 8 \ 4 \ 11
$$

**Passo 3:** Atribuir os três primeiros cortes da lista (1, 6 e 7) ao tratamento A. Os próximos três cortes (12, 5 e 3) são atribuídos ao tratamento B e assim por diante.

]

.blockquote[ ## Estatística `\(F\)` para teste de hipóteses

- As somas de quadrados `\(SQ_Total\)` e `\(SQ_{trat}\)` podem ser calculadas por expressões equivalentes e computacionalmente mais simples:

`\begin{align*}
S{Q_{{Total}}} = \sum\limits_{i = 1}^I {\sum\limits_{j = 1}^J {Y_{ij}^2} } - \frac{Y_{\cdot \cdot}^2}{IJ}
\end{align*}`

e

`\begin{align*}
S{Q_{trat}} = \frac{1}{J} \sum\limits_{i = 1}^I Y_{i\cdot}^2 - \frac{Y_{\cdot \cdot}^2}{IJ}
\end{align*}`

- A soma de quadrados do erro `\(SQ_{Erro}\)` é obtida por subtração

`\begin{align*}
SQ_{Erro} = SQ_{Total} - SQ_{Trat}.
\end{align*}`

]

---





.blockquote[ ## Estatística `\(F\)` para teste de hipóteses

- Quando as médias dos tratamentos são iguais, `\(\mu_1 = \mu_2 = \cdots = \mu_I\)`, pode-se demonstrar que `\(SQTrat/\sigma^2\)` possui uma distribuição qui-quadrado com `\(I - 1\)` graus de liberdade e que é independente da distribuição de `\(SQErro/\sigma^2\)`.

- O quociente:
`\begin{align*}
F = \frac{SQTrat/(I - 1)}{SQErro/(N - I)}
\end{align*}`
é o quociente de duas distribuições de qui-quadrado, cada uma dividida por seus respectivos graus de liberdade.

- Sob a hipótese nula, `\(H_0: \mu_1 = \mu_2 = \cdots = \mu_I\)`, de que não há diferença entre os tratamentos, o quociente possui uma distribuição `\(F\)` com `\(I - 1\)` e `\(N - I\)` graus de liberdade, respectivamente, no numerador e no denominador.

]

---



.blockquote[ ## Estatística `\(F\)` para teste de hipóteses

- A estatística para testar a hipótese nula `\(H_0: \mu_1 = \mu_2 = \cdots = \mu_I\)` é:
`\begin{align*}
F_{c} = \frac{QMTrat}{QMErro},
\end{align*}`
que tem distribuição `\(F\)` quando a hipótese nula é verdadeira.

- Grandes valores de `\(F_c\)` sugerem a rejeição da hipótese nula.

]
---



.blockquote[ ## Estatística `\(F\)` para teste de hipóteses

- A hipótese nula `\(H_0: \mu_1 = \mu_2 = \cdots = \mu_I\)` é rejeitada, com uma probabilidade `\(\alpha\)` de erro tipo I, se

`\begin{align*}
F_c &gt; F_{\alpha, (I - 1), (N - I)}
\end{align*}`

em que `\(F_{\alpha, I - 1, N - I}\)` é o quantil  da distribuição `\(F_{I - 1, N - I}\)`, de probabilidade `\(\alpha\)` da cauda superior.

]

---


**Cálculos da Análise de Variância:**

.scroll-box-20[


1.. Calcular a correção `\(C\)`:

&lt;!-- \begin{align*} --&gt;
&lt;!-- C &amp; = \frac{Y_{\cdot \cdot}^2}{IJ} =  \frac{1}{IJ} \sum_{i = 1}^I \sum_{j = 1}^J Y_{ij} = \\ --&gt;
&lt;!-- &amp; = \frac{1}{IJ} \left(Y_{11}  + Y_{12} + \cdots + Y_{1J} + \right. \\ --&gt;
&lt;!-- &amp; \quad \quad  +  Y_{21}  + Y_{22} + \cdots + Y_{2J} +  \\ --&gt;
&lt;!-- &amp; \quad \quad  +  \cdots +  \\ --&gt;
&lt;!-- &amp; \quad \quad \left. + Y_{I1}  + Y_{I2} + \cdots + Y_{IJ} \right) --&gt;
&lt;!-- \end{align*} --&gt;

`\begin{align*}
C = \frac{Y_{\cdot \cdot}^2}{IJ}  =  \frac{1}{IJ} \left(\sum_{i = 1}^I \sum_{j = 1}^J Y_{ij}\right)^2 =  \frac{1}{IJ} &amp; \left(Y_{11}  + Y_{12} + \cdots + Y_{1J} + \right. \\ 
&amp; + Y_{21}  + Y_{22} + \cdots + Y_{2J} + \\
&amp; + \cdots + \\
&amp; \left. + Y_{I1}  + Y_{I2} + \cdots + Y_{IJ} \right)^2
\end{align*}`


2.. Calcular a soma dos quadrados dos dados:

`\begin{align*}
\sum\limits_{i = 1}^I {\sum\limits_{j = 1}^J {Y_{ij}^2} } = Y_{11}^2  + Y_{12}^2 + \cdots + Y_{1J}^2 +  Y_{21}^2  + Y_{22}^2 + \cdots + Y_{2J}^2 + \cdots + Y_{I1}^2  + Y_{I2}^2 + \cdots + Y_{IJ}^2
\end{align*}`

3.. Calcular a soma de quadrados total (SQTotal):

`\begin{align*}
SQ_{Total} = \sum\limits_{i = 1}^I {\sum\limits_{j = 1}^J {Y_{ij}^2} } - C
\end{align*}`

4.. Calcular a soma dos quadrados dos totais de cada tratamento:

`\begin{align*}
\sum\limits_{i = 1}^I  Y_{i\cdot}^2  &amp; = Y_{1\cdot}^2 + Y_{2\cdot}^2 + \cdots + Y_{I\cdot}^2 \\
&amp; = \left(Y_{11} + Y_{12} + \cdots + Y_{1J}\right)^2 +  \left(Y_{21} + Y_{22} + \cdots + Y_{2J}\right)^2 + \cdots + \left(Y_{I1} + Y_{I2} + \cdots + Y_{IJ}\right)^2
\end{align*}`

5.. Cálculo da soma de quadrados de tratamentos:

`\begin{align*}
SQ_{Trat} = \frac{1}{J}\sum\limits_{i = 1}^I  Y_{i\cdot}^2  - C
\end{align*}`

**Atenção:** observe o quociente do somatório por `\(J\)` (número de repetições).


6.. Cálculo da soma de quadrados dos erros:

`\begin{align*}
SQ_{Erro} = SQ_{Total} - SQ_{Trat}
\end{align*}`

7.. Cálculo dos graus de liberdade:

`\begin{align*}
GL_{Total} = IJ - 1, \quad \quad GL_{Trat} = I - 1 \quad \text{e} \quad GL_{Erro} = GL_{Total} - GL_{Trat} = IJ - 1 - (I - 1) = IJ - I
\end{align*}`

8.. Cálculo dos quadrados médios:

`\begin{align*}
QM_{Trat} = \frac{SQ_{Trat}}{GL_{Trat}} = \frac{SQ_{Trat}}{I - 1} \quad \text{e} \quad QM_{Erro} = \frac{SQ_{Erro}}{GL_{Erro}} = \frac{SQ_{Erro}}{IJ - I}
\end{align*}`


9.. Cálculo da estatística `\(F_c\)`:

`\begin{align*}
F_c = \frac{QM_{Trat}}{QM_{Erro}}
\end{align*}`

10.. Construir a tabela de análise de variância.

11.. Obter o valor tabelado (cauda superior) da distribuição `\(F\)`: `\(F_{(\alpha, GL_{Trat}, GL_{Erro})}\)`

]

## Exemplo de DIC no R

.blockgreen[ 

**Alterações da histomorfologia hepática em relação à suplementação de cobre inorgânico e orgânico em ratos em crescimento**


*Alterations of liver histomorphology in relation to copper supplementation in inorganic and organic form in growing rats*


Autores: Ewa Tomaszewska, Piotr Dobrowolski, Małgorzata Kwiecień, Natalia Burmańczuk, Barbara Badzian, Sylwia Szymańczyk e Paulina Kurlak 


Revista: *Bulletin-Veterinary Institute in Pulawy*, 2014, Vol.58 No.3 pp.479-486.

DOI (e link): [10.2478/bvip-2014-0073](https://cyberleninka.org/article/n/160540.pdf)


&lt;br&gt;

&lt;br&gt;

- Aquivo com os dados: [dados_doses_de_cobre_ratos_dic.xlsx](docs_aula4/dados_doses_de_cobre_ratos_dic.xlsx)
- **Dados simulados a partir das estatísticas disponíveis no artigo.**

]

---


.blockgreen[

.scroll-box-20[

- **Objetivo:** determinar as alterações histomorfológicas em fígado de ratos submetidos a dietas com fonte de cobre inorgânica e de diferentes concentrações de suplementação com cobre-quelato.

- **Variáveis:** Fonte de cobre inorgânica, diferentes concentrações de cobre quelato, análise plasmática, análise imunohistoquímica, histopatológica e histomorfométrica dos fígados.

- **Como obtiveram os dados:** Experimento com divisão aleatoriamente dos indivíduos em grupo controle (dieta com fonte inorgânica de Cu dentro dos valores de ref. para espécie) e grupo experimental dividido a partir da suplementação com 4 concentrações diferentes de cobre. 

- **Análises estatísticas:**  Média e SD; comparação de médias com  one way ANOVA e teste de Dunett para realizar correções na comparação das médias.  Verificar normalidade dos dados com Shapiro Wilk e homogeneidade de variâncias com Brown-Forsythe. Significância p&lt;0,05. Software utilizado: STATISTICA 8.0.

- **Principais resultados:** Aumento do nº de apoptose no grupo II e III (100 e 75% de suplementação cúprica). Aumento no número total de células, de hepatócitos e de hepatócitos multinucleados em grupo V (25% de suplementação). Demais variáveis sem alterações significativas.


]
]


---

.blockgreen[

.scroll-box-20[

- **Tratamentos:**

1. Controle: `\(100\%\)` da demanda diária de Cu na forma inorgânica.
2. `\(100\%\)` da demanda diária de Cu na forma orgânica (quelato de Cobre).
3. `\(75\%\)` da demanda diária de Cu na forma orgânica.
4. `\(50\%\)` da demanda diária de Cu na forma orgânica.
5. `\(25\%\)` da demanda diária de Cu na forma orgânica.


- **Número de repetições:** 12.

- **Parcela:** 1 rato Wistar com peso `\(217,9 \pm 25,5 g\)` e idade de 5 semanas.

- **Número de parcelas:** `\(\#REP \times \#TRAT=12\times5=60\)`.

- **Variáveis respostas:** peso (g), concentração de Cu no plasma (μmol/L) e fígado (μg/g), número de núcleos `\(/mm^2\)`, número total de células `\(/mm^2\)`, número total de hepatócitos `\(/mm^2\)`, número de hepatócitos mononucleares `\(/mm^2\)`, número de hepatócitos multinucleados `\(/mm^2\)`, número de células não hepatócitos `\(/mm^2\)`, espaço intercelular como área ( `\(\%\)`), dimensão fractal do espaço intercelular, área de colágeno `\(\mu m^2/mm^2\)` e células apoptóticas `\(/mm^2\)`.


]
]

## DBC no R

.blockgreen[  ## Suplemento alimentar para vacas em lactação

- Um produtor de leite está interessado em saber se a suplementação alimentar de vacas em lactação pode aumentar a produção de leite.

- Comparar a produção de leite das vacas com suplemento e sem suplemento.
		
- **Tratamentos:** mandioca, araruta, batata doce e sem suplemento.
		
- **Blocos:** raças disponíveis (Gir, Holandesa, Jersey, Nelore e Guzerá).

&lt;br&gt;

- 4 tratamentos e 5 blocos



- Aquivo com os dados: [dados_suplementacao_dbc.xlsx](docs_aula5/dados_suplementacao_dbc.xlsx)

- **Dados fictícios.**

## DQL no R

.blockgreen[  ## Formulações de propulsores (Ex. 4.3, Montgomery, 2012)

- Um engenheiro aeroespacial está estudando os efeitos de cinco formulações diferentes de um propulsor de foguete usado em sistemas de evacuação da tripulação.

- Variável a ser observada: velocidade de queima das formulações.

- Cada formulação é misturada a partir de um lote de matéria-prima que é suficientemente para cinco formulações.

- As formulações são preparadas por diversos operadores.

- Duas fontes de perturbação: lotes e operadores.

- Delineamento apropriado: testar cada formulação apenas uma vez em cada lote de matéria-prima e cada operador preparar uma vez cada formulação.



- Aquivo com os dados: [dados_propulsores_dql.xlsx](docs_aula5/dados_propulsores_dql.xlsx)

- **Dados fictícios.**

## Exemplo de DIC no R

.blockgreen[ 

**Alterações da histomorfologia hepática em relação à suplementação de cobre inorgânico e orgânico em ratos em crescimento**


*Alterations of liver histomorphology in relation to copper supplementation in inorganic and organic form in growing rats*


Autores: Ewa Tomaszewska, Piotr Dobrowolski, Małgorzata Kwiecień, Natalia Burmańczuk, Barbara Badzian, Sylwia Szymańczyk e Paulina Kurlak 


Revista: *Bulletin-Veterinary Institute in Pulawy*, 2014, Vol.58 No.3 pp.479-486.

DOI (e link): [10.2478/bvip-2014-0073](https://cyberleninka.org/article/n/160540.pdf)


&lt;br&gt;

&lt;br&gt;

- Aquivo com os dados: [dados_doses_de_cobre_ratos_dic.xlsx](docs_aula4/dados_doses_de_cobre_ratos_dic.xlsx)
- **Dados simulados a partir das estatísticas disponíveis no artigo.**

]

---


.blockgreen[

.scroll-box-20[

- **Objetivo:** determinar as alterações histomorfológicas em fígado de ratos submetidos a dietas com fonte de cobre inorgânica e de diferentes concentrações de suplementação com cobre-quelato.

- **Variáveis:** Fonte de cobre inorgânica, diferentes concentrações de cobre quelato, análise plasmática, análise imunohistoquímica, histopatológica e histomorfométrica dos fígados.

- **Como obtiveram os dados:** Experimento com divisão aleatoriamente dos indivíduos em grupo controle (dieta com fonte inorgânica de Cu dentro dos valores de ref. para espécie) e grupo experimental dividido a partir da suplementação com 4 concentrações diferentes de cobre. 

- **Análises estatísticas:**  Média e SD; comparação de médias com  one way ANOVA e teste de Dunett para realizar correções na comparação das médias.  Verificar normalidade dos dados com Shapiro Wilk e homogeneidade de variâncias com Brown-Forsythe. Significância p&lt;0,05. Software utilizado: STATISTICA 8.0.

- **Principais resultados:** Aumento do nº de apoptose no grupo II e III (100 e 75% de suplementação cúprica). Aumento no número total de células, de hepatócitos e de hepatócitos multinucleados em grupo V (25% de suplementação). Demais variáveis sem alterações significativas.


]
]


---

.blockgreen[

.scroll-box-20[

- **Tratamentos:**

1. Controle: `\(100\%\)` da demanda diária de Cu na forma inorgânica.
2. `\(100\%\)` da demanda diária de Cu na forma orgânica (quelato de Cobre).
3. `\(75\%\)` da demanda diária de Cu na forma orgânica.
4. `\(50\%\)` da demanda diária de Cu na forma orgânica.
5. `\(25\%\)` da demanda diária de Cu na forma orgânica.


- **Número de repetições:** 12.

- **Parcela:** 1 rato Wistar com peso `\(217,9 \pm 25,5 g\)` e idade de 5 semanas.

- **Número de parcelas:** `\(\#REP \times \#TRAT=12\times5=60\)`.

- **Variáveis respostas:** peso (g), concentração de Cu no plasma (μmol/L) e fígado (μg/g), número de núcleos `\(/mm^2\)`, número total de células `\(/mm^2\)`, número total de hepatócitos `\(/mm^2\)`, número de hepatócitos mononucleares `\(/mm^2\)`, número de hepatócitos multinucleados `\(/mm^2\)`, número de células não hepatócitos `\(/mm^2\)`, espaço intercelular como área ( `\(\%\)`), dimensão fractal do espaço intercelular, área de colágeno `\(\mu m^2/mm^2\)` e células apoptóticas `\(/mm^2\)`.


]
]

## Exemplo de DQL no R

.blockgreen[  ## Formulações de propulsores (Ex. 4.3, Montgomery, 2012)

- Um engenheiro aeroespacial está estudando os efeitos de cinco formulações diferentes de um propulsor de foguete usado em sistemas de evacuação da tripulação.

- Variável a ser observada: velocidade de queima das formulações.

- Cada formulação é misturada a partir de um lote de matéria-prima que é suficientemente para cinco formulações.

- As formulações são preparadas por diversos operadores.

- Duas fontes de perturbação: lotes e operadores.

- Delineamento apropriado: testar cada formulação apenas uma vez em cada lote de matéria-prima e cada operador preparar uma vez cada formulação.



- Aquivo com os dados: [dados_propulsores_dql.xlsx](docs_aula5/dados_propulsores_dql.xlsx)

- **Dados fictícios.**



]
