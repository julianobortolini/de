## Experimentos fatoriais

**AtУЉ agora:**

- experimentos mais simples:
	- comparaУЇУЃo de tratamentos de apenas um fator e demais fatores constantes.
OU
	- comparaУЇУЃo das combinaУЇУЕes dos nУ­veis de mais de um fator sem estudar diretamente o efeito de interaУЇУЃo entre fatores.

---

**Exemplos:**

**Experimento 1.**

Um pesquisador da УЁrea de gado de leite estudou 4 raУЇУЕes com o intuito de avaliar os efeitos na produУЇУЃo leite (...).

**Fator:** raУЇУЕes (1, 2, 3 e 4)

**NУ­veis:** 1, 2, 3 e 4.

**Tratamentos:** 1, 2, 3 e 4.

---

**Exemplos:**

**Experimento 2.**

Um pesquisador tem interesse avaliar se a utilizaУЇУЃo de determinados medicamentos podem afetar o nУ­vel de colesterol no sangue de ratos (cobaias experimentais). Cada animal foi tratado com trУЊs medicamentos ( `\(A\)`, `\(B\)` e `\(C\)` ), com suficiente tempo entre as aplicaУЇУЕes para que o efeito residual de cada medicamento desaparecesse (...)

**Fator:** medicamentos ( `\(A\)`, `\(B\)` e `\(C\)` )

**NУ­veis:** `\(A\)`, `\(B\)` e `\(C\)`

**Tratamentos:** `\(A\)`, `\(B\)` e `\(C\)`


---

**Exemplos:**

**Experimento 3.**

Um pesquisador tem interesse em avaliar se misturas de proteУ­na e de carboidrato forem adicionadas em uma raУЇУЃo, se esta vai melhorar sua qualidade (...)

**Fatores:**

**A** proteУ­na (ausУЊncia e presenУЇa) e 
**B** carboidrato (ausУЊncia e presenУЇa).

**NУ­veis:**

**Fator A:** ausУЊncia e presenУЇa
**Fator B:** ausУЊncia e presenУЇa

**Tratamentos:**

`\(i.\)` raУЇУЃo comum, 

`\(ii.\)` raУЇУЃo comum `\(+\)` carboidrato, 

`\(iii.\)` raУЇУЃo comum `\(+\)` proteУ­na e 

`\(iv.\)` raУЇУЃo comum `\(+\)` carboidrato `\(+\)` proteУ­na.

---

**Exemplos:**

**Experimento 4.**

## Experimentos fatoriais


- Experimentos fatoriais nУЃo constituem um delineamento experimental, mas sim um esquema de arranjo dos tratamentos, que deverУЃo ser distribuУ­dos num delineamento inteiramente casualizado, em blocos casualizados etc.


**Agora:**

- Com os experimentos fatoriais serУЁ possУ­vel obter informaУЇУЕes mais amplas (efeito de interaУЇУЕes entre fatores).

Por exemplo, no experimento 4 podemos comparar os efeitos das 3 Variedades, os efeitos dos 4 EspaУЇamentos e, ainda, **como se comportam as 3 Variedades em cada EspaУЇamento, ou como se comportam os 4 EspaУЇamentos em cada Variedade**, tudo isso com um УКnico experimento.

---

No experimento 3 (misturas de proteУ­na e carboidrato) podemos comparar o efeito (principal) da proteУ­na (ausУЊncia e presenУЇa), o efeito (principal) do carboidrato (ausУЊncia e presenУЇa) e, ainda, **como se comporta a proteУ­na na ausУЊncia ou presenУЇa de carboidrato, ou como se comporta o carboidrato na ausУЊncia ou presenУЇa de proteУ­na**.


Vamos considerar o **experimento 3**, um fatorial `\(2 \times 2\)`, com os fatores: ProteУ­na (P) e Carboidrato (C), nos nУ­veis:

ProteУ­na:

`\(P_0\)` = sem proteУ­na (ausУЊncia)


`\(P_1\)` = com proteУ­na (presenУЇa)





Carboidrato:

`\(C_0\)` = sem carboidrato (ausУЊncia)


`\(C_1\)` = com carboidrato (presenУЇa)

---

Os dados (fictУ­cios) a seguir sУЃo as mУЉdias das diferenУЇas relativas de pesos de aves ( `\(\%\)` ) no perУ­odo de estudo, em cada tratamento:


`\(P_0C_0:\)` sem proteУ­na e sem carboidrato = 14

`\(P_0C_1:\)` sem proteУ­na e com carboidrato = 23

`\(P_1C_0:\)` com proteУ­na e sem carboidrato = 32

`\(P_1C_1:\)` com proteУ­na e com carboidrato = 53


&lt;img src="docs_aula10/fat2.jpg" width="50%" style="display: block; margin: auto;" /&gt;


---

**(A) Efeito simples de um fator:** УЉ uma medida da variaУЇУЃo que ocorre com a caracterУ­stica em estudo (por exemplo: peso relativo), correspondente У  variaУЇУЃo nos nУ­veis desse fator, em cada um dos
nУ­veis do outro fator.


Efeito simples de ProteУ­na na ausУЊncia de Carboidrato:

`\(P\)` dentro de `\(C_0\)` = `\(P\)` d. `\(C_0\)` = `\(P_1C_0\)` - `\(P_1C_0\)` = 32 - 14 = 18

Efeito simples de ProteУ­na na presenУЇa de Carboidrato:

`\(P\)` dentro de `\(C_1\)` = `\(P\)` d. `\(C_1\)` = `\(P_1C_1\)` - `\(P_0C_1\)` = 53 - 23 = 30

Efeito simples de Carboidrato na ausУЊncia de ProteУ­na:

`\(C\)` dentro de `\(P_0\)` = `\(C\)` d. `\(P_0\)` = `\(C_1P_0\)` - `\(C_0P_0\)`   =  23 - 14 = 9

Efeito simples de Carboidrato na presenУЇa de ProteУ­na:

`\(C\)` dentro de `\(P_1\)` = `\(C\)` d. `\(P_1\)` = `\(C_1P_1\)` - `\(C_0P_1\)`  =  53 - 32 = 21


---

Graficamente:


&lt;img src="docs_aula10/fat3.jpg" width="70%" style="display: block; margin: auto;" /&gt;



---

**(B) Efeito principal de um fator:** УЉ uma medida da variaУЇУЃo que ocorre com a caracterУ­stica em estudo (por exemplo: peso relativo), correspondente У  variaУЇУЃo nos nУ­veis desse fator, em mУЉdia de
todos os nУ­veis do outro fator.

O **efeito principal** de um fator УЉ a **mУЉdia dos efeitos simples desse fator**, isto УЉ:


Efeito principal de `\(P\)`:

$$
\frac{(P \ \ d. \ \ C_0) + (P \ \  d. \ \  C_1)}{2} = \frac{(P_1C_0 - P_0C_0) + (P_1C_1 - P_0C_1)}{2} = \frac{18+30}{2} = 48/2 = 24
$$

Efeito principal de `\(C\)`:

$$
\frac{(C \ \ d. \ \ P_0) + (C \ \  d. \ \  P_1)}{2} = \frac{(C_1P_0 - C_0P_0) + (C_1P_1 - C_0P_1)}{2} = \frac{9+21}{2} = 30/2 = 15
$$

---

**(C) Efeito principal de um fator:** УЉ uma medida da variaУЇУЃo que ocorre com a caracterУ­stica em estudo  (por exemplo: peso relativo), correspondente У  variaУЇУЃo nos nУ­veis de um fator, ao passar de um nУ­vel a outro do outro fator.


O efeito da interaУЇУЃo entre dois fatores УЉ um efeito adicional devido У  aУЇУЃo conjunta dos fatores.

O efeito da interaУЇУЃo entre os fatores `\(P\)` e `\(C\)` УЉ:

Efeito da interaУЇУЃo `\(P \times C\)` = `\(\frac{(P \ \ d. \ \ C_1) - (P \ \ d. \ \ C_0)}{2} = \frac{30-18}{2} =12/2 = 6\)`

Efeito da interaУЇУЃo `\(C \times P\)` = `\(\frac{(C \ \ d. \ \ P_1) - (C \ \ d. \ \ P_0)}{2} = \frac{21-9}{2} = 12/2 = 6\)`

**Tanto faz calcular `\(P \times C\)` ou `\(C \times P\)`.**

---

- Devemos observar como a ProteУ­na se comporta na ausУЊncia de `\(C\)` ( `\(P  d. C_0\)` ) e na presenУЇa de `\(C\)` ( `\(P \ \ d. \ \ C_1\)` ),

- e como o carboidrato se comporta na ausУЊncia de `\(P\)` ( `\(C \ \ d. \ \ P_0\)` ) e na presenУЇa de `\(P\)` ( `\(C  \ \ d. \ \ P_1\)` ).


**Se o comportamento for o mesmo, tanto na ausУЊncia como na presenУЇa, nУЃo hУЁ interaУЇУЃo.**


---


&lt;img src="docs_aula10/fat4.jpg" width="90%" style="display: block; margin: auto;" /&gt;

- Nos casos `a` e `b`  nУЃo hУЁ interaУЇУЃo.
- No caso `c` existe uma interaУЇУЃo devida У  diferenУЇa na grandeza da resposta.
- No caso `d`  existe uma interaУЇУЃo devida У  diferenУЇa na direУЇУЃo da resposta.




Quando nУЃo hУЁ interaУЇУЃo, ocorre um paralelismo entre as retas.


A interaУЇУЃo pode ser **positiva** (letra `c`) (sinergismo entre os fatores)  ou **negativa** (letra `d`) (antagonismo entre os fatores).
