## Plano de Ensino <i class="fas  fa-chart-bar fa-pull-right "></i>

**Objetivo geral:**

Planejar e analisar experimentos estatísticos.

&lt;br&gt;


**Objetivos específicos:**

.scroll-box-20[


1. Diferenciar estudos observacionais e experimentais.

2. Planejar experimentos com repetição, aleatorização e controle local.

3. Analisar experimentos planejados nos delineamentos inteiramente casualizado, blocos casualizados e quadrado latino.

4. Comparar os efeitos de tratamentos pelos métodos de comparações múltiplas.

5. Planejar e analisar experimentos fatoriais.

6. Analisar modelos de regressão em experimentos.


]


---
## Plano de Ensino <i class="fas  fa-chart-bar fa-pull-right "></i>



.center[ **Conteúdo Programático:** ]



.scroll-box-20[


**Unidade I:**

- Experimentação estatística.
- Princípios básicos da experimentação.
- Delineamento inteiramente casualizado.
- Delineamento em blocos casualizados.
- Delineamento em quadrado latino.
- Métodos de comparações múltiplas de tratamentos.

**Unidade II:**

- Experimentos fatoriais cruzados.
- Experimentos fatoriais hierárquicos (parcelas subdivididas).

**Unidade III:**

- Modelos de regressão linear.
- Modelos de regressão logística.
- Modelos de regressão poisson.


]

## Plano de Ensino <i class="fas  fa-chart-bar fa-pull-right "></i>

**Avaliação:**

- As datas serão definidas futuramente.

- Três provas síncronas, de conteúdos acumulativos e valendo de 0 a 10.

- Listas de exercícios e atividades em sala, com cada lista ou atividade valendo de 0 a 10. 


- 4 notas, `\(N_1\)`, `\(N_2\)`, `\(N_3\)` e `\(N_4\)` 

  - `\(N_1\)`: nota da prova 1 (unidade I)
  
  - `\(N_2\)`: nota da prova 2 (unidades I e II)
  
  - `\(N_3\)`: nota da prova 3 (unidades I, II e III)
  
  - `\(N_4:\)` média de todas as notas das listas e atividades em sala
  

- Nota final, `\(NF\)`: média aritmética das três maiores notas.

- Conceitos:  `\(A\)` se `\(NF \geq9\)`,  `\(B\)` se `\(9 &gt; NF \geq 7,5\)` ou `\(C\)` se `\(7,5 &gt; NF \geq 6\)`.

- .content-box-yellow[Não haverá registro de faltas na disciplina, ou seja, não haverá reprovação por falta.]
