## Lista 1

.blockgreen[

**Em cada experimento descrito a seguir, identifique: tratamentos, fatores e os seus níveis, blocos, número de repetições, parcela, número de parcelas e variável resposta.**

]

.blockgreen[

**Experimento 1**

Um pesquisador pretende avaliar o comportamento produtivo de diferentes cultivares de milho para produção de forragem, com vista a sua utilização na alimentação animal. Foi avaliado cinco cultivares ( `\(A\)`, `\(B\)`, `\(C\)`, `\(D\)` e `\(E\)` ), sendo que cada cultivar foi repetido por seis vezes. A parcela experimental foi constituída por cinco linhas de seis ( `\(6\)` ) metros de comprimento, espaçadas de um metro entre si; como área útil de avaliação foi considerada as três linhas centrais, eliminando-se `\(50\)` centímetros em ambas as extremidades. Após a germinação e feito o desbaste foram deixadas cinco plantas por metro linear. Foram medidos a produção de grãos, produção de matéria verde e de matéria seca, e teores de macro e micro nutrientes.

]

---

.blockgreen[ **Experimento 1** ]

.scroll-box-20[

**Tratamentos:** cultivares de milho ( `\(A\)`, `\(B\)`, `\(C\)`, `\(D\)` e `\(E\)` )

**Fatores:** cultivares de milho

**Níveis dos fatores:** `\(A\)`, `\(B\)`, `\(C\)`, `\(D\)` e `\(E\)`

**Blocos:** Não há.

**Número de repetições:** 6.

**Parcela:** cinco linhas de seis ( `\(6\)` ) metros de comprimento, espaçadas de um metro entre si.

*Área útil:* três linhas centrais da parcela, eliminando-se `\(50\)` centímetros em ambas as extremidades (bordadura). Após a germinação e feito o desbaste, foram deixadas cinco plantas por metro linear.

*Área útil:* é a parte da parcela que será mensurada.

**Número de parcelas:** `\(\#REP \times \#TRAT=5\times6=30\)`.

**Variável resposta:** produção de grãos, produção de matéria verde e de matéria seca, e teores de macro e micro nutrientes.

]

---

.blockgreen[

**Experimento 2**


Um pesquisador tem interesse em avaliar se misturas de proteína e de carboidrato forem adicionadas em uma ração, se esta vai melhorar sua qualidade. A pesquisa foi realizada em uma granja de aves poedeiras, sendo que as aves escolhidas pertenciam a uma mesma faixa de idade e peso. Cada amostra da ração foi servida a grupos de cinco aves, e os avaliadores pesavam as aves antes de iniciar o fornecimento da ração e depois ao final do experimento. Os tipos de misturas elaboradas foram:

`\(i.\)` ração comum, 

`\(ii.\)` ração comum `\(+\)` carboidrato, 

`\(iii.\)` ração comum `\(+\)` proteína e 

`\(iv.\)` ração comum `\(+\)` carboidrato `\(+\)` proteína.

]

---

.blockgreen[ **Experimento 2** ]

.scroll-box-20[

**Tratamentos:** misturas de proteína e carboidrato

`\(i.\)` ração comum, 

`\(ii.\)` ração comum `\(+\)` carboidrato, 

`\(iii.\)` ração comum `\(+\)` proteína e 

`\(iv.\)` ração comum `\(+\)` carboidrato `\(+\)` proteína.

**Fatores:** misturas de proteína e carboidrato.

**OU** A) proteína e B) carboidrato.

**Níveis dos fatores:**

`\(i.\)` ração comum, 

`\(ii.\)` ração comum `\(+\)` carboidrato, 

`\(iii.\)` ração comum `\(+\)` proteína e 

`\(iv.\)` ração comum `\(+\)` carboidrato `\(+\)` proteína.

**OU**

A) Proteína: ausente e presente e 

B) Carboidrato: ausente e presente.

**Blocos:** Não há.

**Número de repetições:** 5.

**Parcela:** 1 ave.

**Número de parcelas:** `\(\#REP \times \#TRAT=5\times4=20\)`.

**Variável resposta:** Variação de peso.

]

---

.blockgreen[

**Experimento 3**


Um pesquisador pretende estudar o efeito que a aplicação de cloreto de cálcio pode provocar nas características físico-químicas durante o armazenamento de uvas para consumo *in natura*. Foram preparadas soluções de `\(CaCl_2\)` nas concentrações de `\(0, 1, 2, 3\)` e `\(4\%\)` . Foram escolhidos aleatoriamente `\(120\)` cachos de uvas de um conjunto uniforme, previamente colhidos e limpos de qualquer injúria. Cada repetição foi constituída por quatro cachos e cada tratamento foi repetido por seis vezes. Algumas das características avaliadas foram: perda de peso, teores de sólidos solúveis, acidez titulável, açúcares e vitamina `\(C\)`.

]

---

.blockgreen[ **Experimento 3** ]

.scroll-box-20[

**Tratamentos:** soluções de `\(CaCl_2\)` nas concentrações de `\(0, 1, 2, 3\)` e `\(4\%\)`.

**Fatores:**  solução de `\(CaCl_2\)`.

**Níveis dos fatores:** `\(0, 1, 2, 3\)` e `\(4\%\)`.

**Blocos:** Não há.

**Número de repetições:** 6.

**Parcela:** quatro cachos de uvas.

**Número de parcelas:** `\(\#REP \times \#TRAT=6\times5=30\)`.

**Número de unidades experimentais básicas (cachos de uvas):** `\(\#REP \times \#TRAT \times Parcela=6\times5\times4=120\)` cachos de uvas.

**Variável resposta:** perda de peso, teores de sólidos solúveis, acidez titulável, açúcares e vitamina `\(C\)`.


]

---

.blockgreen[

**Experimento 4**


Um pesquisador tem interesse avaliar se a utilização de determinados medicamentos podem afetar o nível de colesterol no sangue de ratos (cobaias experimentais). Cada animal foi tratado com três medicamentos ( `\(A\)`, `\(B\)` e `\(C\)` ), com suficiente tempo entre as aplicações para que o efeito residual de cada medicamento desaparecesse. Os medicamentos foram aplicados em `\(20\)` animais distintos.

]

---

.blockgreen[ **Experimento 4** ]


.scroll-box-20[

**Tratamentos:** medicamentos ( `\(A\)`, `\(B\)` e `\(C\)` )

**Fatores:** medicamento

**Níveis dos fatores:** `\(A\)`, `\(B\)` e `\(C\)`

**Blocos:** Não há.

**Número de repetições:** 20

**Parcela:** 1 rato.

**Número de parcelas:** `\(\#REP \times \#TRAT=20\times3=60\)`.

**Variável resposta:** nível de colesterol.

*Esse é um experimento chamado teste cruzado (ou crossover). Todos os animais receberão todos os tratamentos em momentos distintos.*


]

## Exemplo de DIC no R

.blockgreen[ 

**Alterações da histomorfologia hepática em relação à suplementação de cobre inorgânico e orgânico em ratos em crescimento**


*Alterations of liver histomorphology in relation to copper supplementation in inorganic and organic form in growing rats*


Autores: Ewa Tomaszewska, Piotr Dobrowolski, Małgorzata Kwiecień, Natalia Burmańczuk, Barbara Badzian, Sylwia Szymańczyk e Paulina Kurlak 


Revista: *Bulletin-Veterinary Institute in Pulawy*, 2014, Vol.58 No.3 pp.479-486.

DOI (e link): [10.2478/bvip-2014-0073](https://cyberleninka.org/article/n/160540.pdf)


&lt;br&gt;

&lt;br&gt;

- Aquivo com os dados: [dados_doses_de_cobre_ratos_dic.xlsx](docs_aula4/dados_doses_de_cobre_ratos_dic.xlsx)
- **Dados simulados a partir das estatísticas disponíveis no artigo.**

]

---


.blockgreen[

.scroll-box-20[

- **Objetivo:** determinar as alterações histomorfológicas em fígado de ratos submetidos a dietas com fonte de cobre inorgânica e de diferentes concentrações de suplementação com cobre-quelato.

- **Variáveis:** Fonte de cobre inorgânica, diferentes concentrações de cobre quelato, análise plasmática, análise imunohistoquímica, histopatológica e histomorfométrica dos fígados.

- **Como obtiveram os dados:** Experimento com divisão aleatoriamente dos indivíduos em grupo controle (dieta com fonte inorgânica de Cu dentro dos valores de ref. para espécie) e grupo experimental dividido a partir da suplementação com 4 concentrações diferentes de cobre. 

- **Análises estatísticas:**  Média e SD; comparação de médias com  one way ANOVA e teste de Dunett para realizar correções na comparação das médias.  Verificar normalidade dos dados com Shapiro Wilk e homogeneidade de variâncias com Brown-Forsythe. Significância p&lt;0,05. Software utilizado: STATISTICA 8.0.

- **Principais resultados:** Aumento do nº de apoptose no grupo II e III (100 e 75% de suplementação cúprica). Aumento no número total de células, de hepatócitos e de hepatócitos multinucleados em grupo V (25% de suplementação). Demais variáveis sem alterações significativas.


]
]


---

.blockgreen[

.scroll-box-20[

- **Tratamentos:**

1. Controle: `\(100\%\)` da demanda diária de Cu na forma inorgânica.
2. `\(100\%\)` da demanda diária de Cu na forma orgânica (quelato de Cobre).
3. `\(75\%\)` da demanda diária de Cu na forma orgânica.
4. `\(50\%\)` da demanda diária de Cu na forma orgânica.
5. `\(25\%\)` da demanda diária de Cu na forma orgânica.


- **Número de repetições:** 12.

- **Parcela:** 1 rato Wistar com peso `\(217,9 \pm 25,5 g\)` e idade de 5 semanas.

- **Número de parcelas:** `\(\#REP \times \#TRAT=12\times5=60\)`.

- **Variáveis respostas:** peso (g), concentração de Cu no plasma (μmol/L) e fígado (μg/g), número de núcleos `\(/mm^2\)`, número total de células `\(/mm^2\)`, número total de hepatócitos `\(/mm^2\)`, número de hepatócitos mononucleares `\(/mm^2\)`, número de hepatócitos multinucleados `\(/mm^2\)`, número de células não hepatócitos `\(/mm^2\)`, espaço intercelular como área ( `\(\%\)`), dimensão fractal do espaço intercelular, área de colágeno `\(\mu m^2/mm^2\)` e células apoptóticas `\(/mm^2\)`.


]
]

  kable(digits = 2)

  for (i = 0; i < codes.length;) {
    code = codes[i];
    if (code.parentNode.tagName !== 'PRE' && code.childElementCount === 0) {
      text = code.textContent;
      if (/^\\\((.|\s)+\\\)$/.test(text) || /^\\\[(.|\s)+\\\]$/.test(text) ||
          /^\$\$(.|\s)+\$\$$/.test(text) ||
          /^\\begin\{([^}]+)\}(.|\s)+\\end\{[^}]+\}$/.test(text)) {
        code.outerHTML = code.innerHTML;  // remove <code></code>
        continue;
      }
    }
    i++;
  }
};
slideshow._releaseMath(document);
